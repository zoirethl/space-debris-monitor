name: Weekly Space Data Update

on:
  schedule:
    - cron: '0 6 * * 1'  
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run fetch script
        env:
          SPACE_TRACK_USER: ${{ secrets.SPACE_TRACK_USER }}
          SPACE_TRACK_PASS: ${{ secrets.SPACE_TRACK_PASS }}
        run: python fetch_data.py

      - name: Commit and push new data
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          # Configurar usuario con TU cuenta
          git config user.name "zoirethl"
          git config user.email "zoirethl@gmail.com"
          
          # Configurar la URL con el token (ESTA ES LA LÍNEA CLAVE)
          git remote set-url origin https://zoirethl:${PAT_TOKEN}@github.com/zoirethl/space-debris-monitor.git
          
          git add data/
          git diff --staged --quiet || git commit -m "Auto-update: weekly orbital data $(date -u '+%Y-%m-%d')"
          git push origin main
